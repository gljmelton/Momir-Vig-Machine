[GENERAL]
bulkdataname = oracle-cards.json
excludesets = funny, memorabilia, minigame, alchemy, tokens
excludelayouts = token, emblem, art_series, double_faced_token, scheme, planar, phenomenon, vanguard, augment, host, meld
pseudodoublefacedlayouts = adventure, omen, flip, prepare
requiregames = paper
requiretypes = creature
excludeplaytest = true

#Project relative path to save images to. Must end with a slash.
imagepath = Images/
imagetype = png 

#Set to True to enable verbose logging during parsing.
verboselogging = false

[GPIO]
button1pin = 17
button2pin = 27
button3pin = 22
buttonbouncetime = 0.05